<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>go-tv / edit</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }

    /* ---- header ---- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1rem; color: #666; letter-spacing: .08em; }
    header nav { display: flex; gap: 12px; align-items: center; }
    header a { color: #888; text-decoration: none; font-size: .85rem; }
    header a:hover { color: #ccc; }

    /* ---- list ---- */
    #video-list {
      list-style: none;
      max-width: 860px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ---- card ---- */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0 12px;
      align-items: start;
      cursor: default;
      transition: border-color .15s;
    }
    .card.drag-over { border-color: #2563eb; }
    .card.dragging { opacity: .4; }
    .card.active { border-color: #22c55e; }

    /* drag handle */
    .handle {
      cursor: grab;
      color: #444;
      font-size: 18px;
      line-height: 1;
      padding-top: 2px;
      user-select: none;
    }
    .handle:active { cursor: grabbing; }

    /* card body */
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .title { font-weight: 500; color: #eee; }
    .vid-id { font-size: .75rem; font-family: monospace; }

    /* ---- position slider ---- */
    .pos-slider-wrap {
      position: relative;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      margin: 8px 0;
    }

    .pos-fill {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      pointer-events: none;
      background: #22c55e;
    }

    .pos-slider-wrap input[type=range] {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      outline: none;
      border: none;
      margin: 0;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    .pos-slider-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: grab;
      box-shadow: 0 1px 3px rgba(0,0,0,.5);
      background: #22c55e;
    }

    .pos-slider-wrap input[type=range]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: grab;
      border: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.5);
      background: #22c55e;
    }

    .pos-slider-wrap input[type=range]:active::-webkit-slider-thumb { cursor: grabbing; }

    .times {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
    }
    .yt-link { font-size: .75rem; text-decoration: none; }
    .yt-link:hover { color: #c44; }

    .text-faint { color: #444; }
    .text-muted { color: #555; }
    .text-dim   { color: #777; }

    .meta-right { display: flex; gap: 8px; align-items: center; }
    .play-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: .8rem;
      padding: 0 2px;
      line-height: 1;
      transition: color .15s;
    }
    .play-btn:hover { color: #ccc; }
    .card.active .play-btn { color: #22c55e; }

    /* ---- set group ---- */
    .set-item { list-style: none; }
    .set-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 0;
      border-bottom: 1px solid #222;
      margin-bottom: 8px;
    }
    .set-toggle {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: .65rem;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .set-item:not(.collapsed) .set-toggle { transform: rotate(90deg); }
    .set-name-input {
      background: none;
      border: none;
      color: #888;
      font-size: .85rem;
      font-weight: 500;
      font-family: inherit;
      flex: 1;
      outline: none;
      padding: 2px 4px;
      border-bottom: 1px solid transparent;
    }
    .set-name-input:focus { color: #ccc; border-bottom-color: #2563eb; }
    .set-videos {
      list-style: none;
      padding-left: 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 6px;
    }
    .set-item.collapsed .set-videos { display: none; }
    .set-item.collapsed .set-header  { border-bottom: none; margin-bottom: 0; }
    .set-item.active-set > .set-header { border-bottom-color: #22c55e44; }
    .set-item.active-set > .set-header .set-name-input { color: #22c55e; }

    /* ---- segment timeline bar ---- */
    .segs-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: -4px 0 8px;
    }
    .segs-bar-track {
      flex: 1;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .seg-chunk {
      position: absolute;
      height: 100%;
      background: #2563eb88;
      border-radius: 1px;
    }
    .sb-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: .65rem;
      padding: 0;
      line-height: 1;
      font-family: inherit;
      transition: color .15s;
    }
    .sb-btn:hover { color: #aaa; }
    .sb-btn.open { color: #2563eb; }

    /* ---- position slider ---- */
    .pos-wrap {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }
    /* ---- empty / loading ---- */
    #status { text-align: center; padding: 60px 0; }

    /* ---- sponsorblock panel ---- */
    .sb-panel {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }
    .sb-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .sb-panel-title { font-size: .7rem; color: #555; text-transform: uppercase; letter-spacing: .08em; }
    .sb-close { background: none; border: none; color: #444; cursor: pointer; padding: 0; line-height: 1; font-size: .8rem; }
    .sb-close:hover { color: #aaa; }

    .sb-seg-list { list-style: none; display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
    .sb-seg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 3px;
      cursor: pointer;
      transition: background .1s;
    }
    .sb-seg-row:hover { background: #ffffff08; }
    .sb-seg-row input[type=checkbox] { cursor: pointer; margin: 0; accent-color: #f59e0b; flex-shrink: 0; }
    .sb-cat {
      font-size: .7rem;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
      min-width: 80px;
      text-align: center;
      flex-shrink: 0;
    }
    .sb-time { color: #777; font-size: .78rem; font-family: monospace; }
    .sb-votes { color: #444; font-size: .7rem; margin-left: auto; }

    .sb-footer {
      display: flex;
      gap: 6px;
      padding-top: 6px;
      border-top: 1px solid #1e1e1e;
    }
    .sb-footer button {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      cursor: pointer;
      font-size: .75rem;
      padding: 3px 10px;
      border-radius: 3px;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .sb-footer button:hover { color: #ccc; border-color: #555; }
    .sb-apply-btn { color: #f59e0b !important; border-color: #f59e0b44 !important; }
    .sb-apply-btn:hover { border-color: #f59e0b !important; }
  </style>
</head>
<body>

<header>
  <h1>go-tv</h1>
  <nav>
    <a href="/">Resume</a>
  </nav>
</header>

<ul id="video-list">
  <li id="status" class="text-muted">Loading…</li>
</ul>

<script>
  let items = [];   // working copy — array of video-items or set-items
  let dirty = false;

  const list = document.getElementById('video-list');

  // -----------------------------------------------------------------------
  // SponsorBlock category colours
  // -----------------------------------------------------------------------

  const sbCatColors = {
    sponsor:        { bg: '#00d40018', fg: '#4caf50' },
    selfpromo:      { bg: '#cccc0018', fg: '#b8a800' },
    interaction:    { bg: '#cc00ff18', fg: '#ab5ae6' },
    intro:          { bg: '#00cccc18', fg: '#00aaaa' },
    outro:          { bg: '#3333ff18', fg: '#6666ee' },
    preview:        { bg: '#007bbd18', fg: '#008fd6' },
    music_offtopic: { bg: '#ff990018', fg: '#e08800' },
    filler:         { bg: '#7300ab18', fg: '#9b5dcc' },
  };

  // -----------------------------------------------------------------------
  // API
  // -----------------------------------------------------------------------

  async function loadSchedule() {
    const res = await fetch('/api/schedule');
    if (!res.ok) throw new Error('failed to load schedule');
    const data = await res.json();
    return data.items ?? [];
  }

  async function loadState() {
    try {
      const res = await fetch('/api/state');
      if (!res.ok) return null;
      return res.json();
    } catch { return null; }
  }

  async function jump(videoId, seconds) {
    const res = await fetch('/api/jump', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video_id: videoId, seconds }),
    });
    if (!res.ok) throw new Error('failed to jump');
    return res.json();
  }

  async function saveSchedule(items) {
    const res = await fetch('/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items }),
    });
    if (!res.ok) throw new Error('failed to save');
  }

  async function fetchSBSegments(videoId) {
    const res = await fetch(`/api/sponsorblock/${encodeURIComponent(videoId)}`);
    if (!res.ok) throw new Error(`SponsorBlock error: ${res.status}`);
    const data = await res.json();
    return data.segments ?? [];
  }

  async function applySBCuts(videoId, cuts) {
    const res = await fetch(`/api/sponsorblock/${encodeURIComponent(videoId)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cuts }),
    });
    if (!res.ok) throw new Error('failed to apply');
    const data = await res.json();
    return data.segments ?? [];
  }

  // -----------------------------------------------------------------------
  // Segment bar
  // -----------------------------------------------------------------------

  function renderSegsBar(li, video) {
    const track = li.querySelector('.segs-bar-track');
    const segs = video.segments;
    const len = video.length_seconds || 1;
    track.innerHTML = '';
    if (!segs || !segs.length) return;
    segs.forEach(seg => {
      const start = seg.start_seconds || 0;
      const end   = seg.end_seconds   || len;
      const chunk = document.createElement('div');
      chunk.className = 'seg-chunk';
      chunk.style.left  = (start / len * 100) + '%';
      chunk.style.width = ((end - start) / len * 100) + '%';
      chunk.title = `${fmt(start)} → ${fmt(end)}`;
      track.appendChild(chunk);
    });
  }

  // -----------------------------------------------------------------------
  // Helpers
  // -----------------------------------------------------------------------

  function fmt(secs) {
    const s = Math.round(secs);
    const m = Math.floor(s / 60);
    return `${m}:${String(s % 60).padStart(2, '0')}`;
  }

  let saveTimer = null;
  function markDirty() {
    dirty = true;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        await saveSchedule(collectOrder());
        dirty = false;
      } catch {}
    }, 800);
  }

  // -----------------------------------------------------------------------
  // Item helpers
  // -----------------------------------------------------------------------

  // Returns a live reference into items[] so mutations propagate.
  function findVideoById(id) {
    for (const item of items) {
      const v = item.videos.find(v => v.id === id);
      if (v) return v;
    }
    return null;
  }

  // -----------------------------------------------------------------------
  // Active state
  // -----------------------------------------------------------------------

  let activeVideoId = null;

  function updatePosSlider(card) {
    const range = card.querySelector('.pos-range');
    const fill  = card.querySelector('.pos-fill');
    const val   = parseFloat(range.value);
    fill.style.width = (val / (parseFloat(range.max) || 1) * 100) + '%';
    card.querySelector('.pos-display').textContent = fmt(val);
  }

  function onPosInput(e) {
    updatePosSlider(e.target.closest('.card'));
  }

  async function onPosChange(e) {
    const card = e.target.closest('.card');
    try {
      await jump(card.dataset.id, parseFloat(card.querySelector('.pos-range').value));
    } catch {}
  }

  function setActive(videoId, seconds) {
    if (activeVideoId) {
      const prev = list.querySelector(`.card[data-id="${CSS.escape(activeVideoId)}"]`);
      if (prev) {
        prev.querySelector('.pos-wrap').style.display = 'none';
        prev.classList.remove('active');
        const prevSet = prev.closest('.set-item');
        if (prevSet) prevSet.classList.remove('active-set');
      }
    }
    activeVideoId = videoId;
    const card = list.querySelector(`.card[data-id="${CSS.escape(videoId)}"]`);
    if (!card) return;
    card.querySelector('.pos-range').value = seconds;
    updatePosSlider(card);
    card.querySelector('.pos-wrap').style.display = '';
    card.classList.add('active');
    const setItem = card.closest('.set-item');
    if (setItem) {
      setItem.classList.add('active-set');
    }
  }


  // -----------------------------------------------------------------------
  // Build card DOM
  // -----------------------------------------------------------------------

  function buildCard(v) {
    const li = document.createElement('li');
    li.className = 'card';
    li.dataset.id = v.id;

    const max = v.length_seconds || 600;

    li.innerHTML = `
      <div class="handle" title="drag to reorder">⠿</div>
      <div class="body">
        <div class="meta">
          <span class="title">${escHtml(v.title || v.id)}</span>
          <span class="meta-right">
            <a class="vid-id yt-link text-muted" href="https://www.youtube.com/watch?v=${escHtml(v.id)}" target="_blank" rel="noopener">↗ ${escHtml(v.id)}</a>
            <button class="play-btn" title="jump to this video">▶</button>
          </span>
        </div>
        <div class="segs-bar">
          <div class="segs-bar-track"></div>
          <button class="sb-btn" title="check SponsorBlock segments">SB</button>
        </div>
        <div class="sb-panel" style="display:none">
          <div class="sb-panel-header">
            <span class="sb-panel-title">SponsorBlock</span>
            <button class="sb-close">✕</button>
          </div>
          <div class="sb-body text-muted">Loading…</div>
          <div class="sb-footer" style="display:none">
            <button class="sb-apply-btn">Apply selected</button>
            <button class="sb-clear-btn">Clear segments</button>
          </div>
        </div>
        <div class="pos-wrap" style="display:none">
          <div class="pos-slider-wrap">
            <div class="pos-fill"></div>
            <input class="pos-range" type="range" min="0" max="${max}" step="1" value="0">
          </div>
          <div class="times text-muted">
            <span>Now Playing</span>
            <span class="pos-display">0:00</span>
          </div>
        </div>
      </div>`;

    li.querySelector('.pos-range').addEventListener('input', onPosInput);
    li.querySelector('.pos-range').addEventListener('change', onPosChange);
    li.querySelector('.play-btn').addEventListener('click', async () => {
      try {
        const st = await jump(v.id, 0);
        setActive(st.video_id, st.seconds);
      } catch {}
    });

    // Prevent slider/button interactions from triggering drag
    li.querySelectorAll('input, button').forEach(el => {
      el.addEventListener('mousedown', e => e.stopPropagation());
    });

    renderSegsBar(li, v);

    // --- SponsorBlock ---
    const sbBtn    = li.querySelector('.sb-btn');
    const sbPanel  = li.querySelector('.sb-panel');
    const sbBody   = li.querySelector('.sb-body');
    const sbFooter = li.querySelector('.sb-footer');
    let sbSegs = null; // cached after first fetch

    function sbClose() {
      sbPanel.style.display = 'none';
      sbBtn.classList.remove('open');
    }

    function sbRender(segs) {
      if (!segs.length) {
        sbBody.textContent = 'No segments found.';
        sbBody.className = 'sb-body text-muted';
        sbFooter.style.display = 'none';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'sb-seg-list';
      segs.forEach(seg => {
        const row = document.createElement('li');
        row.className = 'sb-seg-row';
        const c = sbCatColors[seg.category] || { bg: '#33333322', fg: '#888' };
        row.innerHTML = `
          <input type="checkbox" class="sb-check" data-idx="${seg.index}" checked>
          <span class="sb-cat" style="background:${c.bg};color:${c.fg}">${escHtml(seg.category)}</span>
          <span class="sb-time">${fmt(seg.start_seconds)} → ${fmt(seg.end_seconds)}</span>
          <span class="sb-votes">${seg.votes > 0 ? '+' : ''}${seg.votes}</span>`;
        row.addEventListener('click', e => {
          if (e.target.tagName !== 'INPUT') {
            const cb = row.querySelector('.sb-check');
            cb.checked = !cb.checked;
          }
        });
        row.querySelector('input').addEventListener('mousedown', e => e.stopPropagation());
        ul.appendChild(row);
      });
      sbBody.innerHTML = '';
      sbBody.appendChild(ul);
      sbBody.className = 'sb-body';
      sbFooter.style.display = 'flex';
    }

    sbBtn.addEventListener('click', async () => {
      if (sbPanel.style.display !== 'none') { sbClose(); return; }
      sbPanel.style.display = '';
      sbBtn.classList.add('open');
      if (sbSegs !== null) { sbRender(sbSegs); return; }
      sbBody.textContent = 'Loading…';
      sbBody.className = 'sb-body text-muted';
      sbFooter.style.display = 'none';
      try {
        sbSegs = await fetchSBSegments(v.id);
        sbRender(sbSegs);
      } catch {
        sbBody.textContent = 'Failed to load segments.';
        sbBody.className = 'sb-body text-muted';
        sbSegs = null;
      }
    });

    li.querySelector('.sb-close').addEventListener('click', sbClose);

    li.querySelector('.sb-apply-btn').addEventListener('click', async () => {
      const checked = new Set(
        [...sbPanel.querySelectorAll('.sb-check:checked')].map(cb => parseInt(cb.dataset.idx))
      );
      const cuts = (sbSegs || [])
        .filter(seg => checked.has(seg.index))
        .map(seg => ({ start_seconds: seg.start_seconds, end_seconds: seg.end_seconds }));
      try {
        const newSegs = await applySBCuts(v.id, cuts);
        const vid = findVideoById(v.id);
        if (vid) { vid.segments = newSegs; renderSegsBar(li, vid); }
        sbClose();
      } catch {
        sbBody.textContent = 'Failed to apply segments.';
        sbBody.className = 'sb-body text-muted';
      }
    });

    li.querySelector('.sb-clear-btn').addEventListener('click', async () => {
      try {
        const newSegs = await applySBCuts(v.id, []);
        const vid = findVideoById(v.id);
        if (vid) { vid.segments = newSegs; renderSegsBar(li, vid); }
        sbClose();
      } catch {
        sbBody.textContent = 'Failed to clear segments.';
        sbBody.className = 'sb-body text-muted';
      }
    });

    initDrag(li);
    return li;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // -----------------------------------------------------------------------
  // Collect order for saving
  // -----------------------------------------------------------------------

  function collectOrder() {
    return [...list.querySelectorAll(':scope > .set-item')].map(el => ({
      name: el.querySelector('.set-name-input').value,
      videos: [...el.querySelectorAll(':scope > .set-videos > .card')]
        .map(card => findVideoById(card.dataset.id))
        .filter(Boolean),
    }));
  }

  // -----------------------------------------------------------------------
  // Drag & drop reordering
  // -----------------------------------------------------------------------

  let dragSrc = null;

  // Works for both top-level items (cards or set-items) and cards within a set.
  // Drag is restricted to siblings within the same parent container.
  function initDrag(el) {
    const handle = el.querySelector('.handle');

    handle.addEventListener('mousedown', () => { el.draggable = true; });
    el.addEventListener('dragend', () => {
      el.draggable = false;
      el.classList.remove('dragging', 'drag-over');
      if (el.parentNode) [...el.parentNode.children].forEach(c => c.classList.remove('drag-over'));
      dragSrc = null;
    });
    el.addEventListener('dragstart', e => {
      e.stopPropagation();
      dragSrc = el;
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      if (!dragSrc || dragSrc === el || dragSrc.parentNode !== el.parentNode) return;
      [...el.parentNode.children].forEach(c => c.classList.remove('drag-over'));
      el.classList.add('drag-over');
      const siblings = [...el.parentNode.children];
      const srcIdx = siblings.indexOf(dragSrc);
      const dstIdx = siblings.indexOf(el);
      el.parentNode.insertBefore(dragSrc, srcIdx < dstIdx ? el.nextSibling : el);
      markDirty();
    });
  }

  // -----------------------------------------------------------------------
  // Render
  // -----------------------------------------------------------------------

  function buildSetItem(set) {
    const li = document.createElement('li');
    li.className = 'set-item collapsed';

    li.innerHTML = `
      <div class="set-header">
        <div class="handle text-faint" title="drag to reorder">⠿</div>
        <button class="set-toggle" title="collapse/expand">▶</button>
        <input class="set-name-input" type="text" value="${escHtml(set.name)}">
      </div>
      <ul class="set-videos"></ul>`;

    const videoList = li.querySelector('.set-videos');
    (set.videos ?? []).forEach(v => videoList.appendChild(buildCard(v)));

    li.querySelector('.set-toggle').addEventListener('click', () => li.classList.toggle('collapsed'));
    li.querySelector('.set-name-input').addEventListener('input', markDirty);
    li.querySelectorAll('input').forEach(input => {
      input.addEventListener('mousedown', e => e.stopPropagation());
    });

    initDrag(li);
    return li;
  }

  function render(data) {
    items = data;
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<li id="status" class="text-muted">No items in schedule.</li>';
      return;
    }
    items.forEach(item => list.appendChild(buildSetItem(item)));
  }

  // -----------------------------------------------------------------------
  // Init
  // -----------------------------------------------------------------------

  loadSchedule()
    .then(async data => {
      render(data);
      const st = await loadState();
      if (st) setActive(st.video_id, st.seconds);
    })
    .catch(() => { list.innerHTML = '<li id="status" class="text-muted">Failed to load schedule.</li>'; });
</script>
</body>
</html>
