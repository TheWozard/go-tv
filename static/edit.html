<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>go-tv / edit</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }

    /* ---- header ---- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1rem; color: #666; letter-spacing: .08em; }
    header nav { display: flex; gap: 12px; align-items: center; }
    header a { color: #888; text-decoration: none; font-size: .85rem; }
    header a:hover { color: #ccc; }

    /* ---- list ---- */
    #video-list {
      list-style: none;
      max-width: 860px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ---- card ---- */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0 12px;
      align-items: start;
      cursor: default;
      transition: border-color .15s;
    }
    .card.drag-over { border-color: #2563eb; }
    .card.dragging { opacity: .4; }
    .card.active { border-color: #22c55e; }

    /* drag handle */
    .handle {
      cursor: grab;
      color: #444;
      font-size: 18px;
      line-height: 1;
      padding-top: 2px;
      user-select: none;
    }
    .handle:active { cursor: grabbing; }

    /* card body */
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .title { font-weight: 500; color: #eee; }
    .vid-id { font-size: .75rem; font-family: monospace; }

    /* ---- sliders (shared) ---- */
    .slider-wrap,
    .pos-slider-wrap {
      position: relative;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
    }
    .slider-wrap     { margin: 18px 0 10px; }
    .pos-slider-wrap { margin: 8px 0; }

    .slider-range,
    .pos-fill {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      pointer-events: none;
    }
    .slider-range { background: #2563eb; }
    .pos-fill     { background: #22c55e; }

    .slider-wrap input[type=range],
    .pos-slider-wrap input[type=range] {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      outline: none;
      border: none;
      margin: 0;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    .slider-wrap input[type=range] { pointer-events: none; }

    .slider-wrap input[type=range]::-webkit-slider-thumb,
    .pos-slider-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: grab;
      box-shadow: 0 1px 3px rgba(0,0,0,.5);
    }
    .slider-wrap input[type=range]::-webkit-slider-thumb     { pointer-events: auto; background: #fff; }
    .pos-slider-wrap input[type=range]::-webkit-slider-thumb { background: #22c55e; }

    .slider-wrap input[type=range]::-moz-range-thumb,
    .pos-slider-wrap input[type=range]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: grab;
      border: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.5);
    }
    .slider-wrap input[type=range]::-moz-range-thumb     { pointer-events: auto; background: #fff; }
    .pos-slider-wrap input[type=range]::-moz-range-thumb { background: #22c55e; }

    .slider-wrap input[type=range]:active::-webkit-slider-thumb,
    .pos-slider-wrap input[type=range]:active::-webkit-slider-thumb { cursor: grabbing; }

    .times {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
    }
    .time-input {
      background: none;
      border: none;
      border-bottom: 1px solid #444;
      color: #aaa;
      font-size: .75rem;
      font-family: inherit;
      width: 40px;
      text-align: center;
      padding: 0 2px;
      outline: none;
    }
    .time-input:focus { border-bottom-color: #2563eb; color: #eee; }
    .yt-link { font-size: .75rem; text-decoration: none; }
    .yt-link:hover { color: #c44; }

    .text-faint { color: #444; }
    .text-muted { color: #555; }
    .text-dim   { color: #777; }

    .meta-right { display: flex; gap: 8px; align-items: center; }
    .play-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: .8rem;
      padding: 0 2px;
      line-height: 1;
      transition: color .15s;
    }
    .play-btn:hover { color: #ccc; }
    .card.active .play-btn { color: #22c55e; }

    /* ---- position slider ---- */
    .pos-wrap {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }
    /* ---- empty / loading ---- */
    #status { text-align: center; padding: 60px 0; }
  </style>
</head>
<body>

<header>
  <h1>go-tv</h1>
  <nav>
    <a href="/">Resume</a>
  </nav>
</header>

<ul id="video-list">
  <li id="status" class="text-muted">Loading…</li>
</ul>

<script>
  let videos = [];  // working copy
  let dirty = false;

  const list = document.getElementById('video-list');

  // -----------------------------------------------------------------------
  // API
  // -----------------------------------------------------------------------

  async function loadSchedule() {
    const res = await fetch('/api/schedule');
    if (!res.ok) throw new Error('failed to load schedule');
    const data = await res.json();
    return data.videos ?? [];
  }

  async function loadState() {
    try {
      const res = await fetch('/api/state');
      if (!res.ok) return null;
      return res.json();
    } catch { return null; }
  }

  async function jump(videoId, seconds) {
    const res = await fetch('/api/jump', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video_id: videoId, seconds }),
    });
    if (!res.ok) throw new Error('failed to jump');
    return res.json();
  }

  async function saveSchedule(videos) {
    const res = await fetch('/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videos }),
    });
    if (!res.ok) throw new Error('failed to save');
  }

  // -----------------------------------------------------------------------
  // Helpers
  // -----------------------------------------------------------------------

  function fmt(secs) {
    const s = Math.round(secs);
    const m = Math.floor(s / 60);
    return `${m}:${String(s % 60).padStart(2, '0')}`;
  }

  let saveTimer = null;
  function markDirty() {
    dirty = true;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        await saveSchedule(collectOrder());
        dirty = false;
      } catch {}
    }, 800);
  }

  // -----------------------------------------------------------------------
  // Active state
  // -----------------------------------------------------------------------

  let activeVideoId = null;

  function updatePosSlider(card) {
    const range = card.querySelector('.pos-range');
    const fill  = card.querySelector('.pos-fill');
    const val   = parseFloat(range.value);
    fill.style.width = (val / (parseFloat(range.max) || 1) * 100) + '%';
    card.querySelector('.pos-display').textContent = fmt(val);
  }

  function onPosInput(e) {
    updatePosSlider(e.target.closest('.card'));
  }

  async function onPosChange(e) {
    const card = e.target.closest('.card');
    try {
      await jump(card.dataset.id, parseFloat(card.querySelector('.pos-range').value));
    } catch {}
  }

  function setActive(videoId, seconds) {
    if (activeVideoId) {
      const prev = list.querySelector(`.card[data-id="${CSS.escape(activeVideoId)}"]`);
      if (prev) {
        prev.querySelector('.pos-wrap').style.display = 'none';
        prev.classList.remove('active');
      }
    }
    activeVideoId = videoId;
    const card = list.querySelector(`.card[data-id="${CSS.escape(videoId)}"]`);
    if (!card) return;
    card.querySelector('.pos-range').value = seconds;
    updatePosSlider(card);
    card.querySelector('.pos-wrap').style.display = '';
    card.classList.add('active');
  }

  // -----------------------------------------------------------------------
  // Slider
  // -----------------------------------------------------------------------

  function updateSlider(card) {
    const start  = card.querySelector('.start-range');
    const stop   = card.querySelector('.stop-range');
    const range  = card.querySelector('.slider-range');
    const max    = parseFloat(start.max) || 1;
    const startV = parseFloat(start.value);
    const stopV  = parseFloat(stop.value);

    const leftPct  = (startV / max) * 100;
    const rightPct = (stopV  / max) * 100;
    range.style.left  = leftPct + '%';
    range.style.width = (rightPct - leftPct) + '%';

    card.querySelector('.start-time').value = fmt(startV);
    card.querySelector('.stop-time').value  = fmt(stopV);
    card.querySelector('.stop-early').textContent = `-${Math.round(max - stopV)}s`;
  }

  function onStartInput(e) {
    const card = e.target.closest('.card');
    const stop = card.querySelector('.stop-range');
    if (parseFloat(e.target.value) >= parseFloat(stop.value)) {
      e.target.value = Math.max(0, parseFloat(stop.value) - 1);
    }
    updateSlider(card);
    syncVideoFromCard(card);
    markDirty();
  }

  function onStopInput(e) {
    const card = e.target.closest('.card');
    const start = card.querySelector('.start-range');
    if (parseFloat(e.target.value) <= parseFloat(start.value)) {
      e.target.value = Math.min(parseFloat(e.target.max), parseFloat(start.value) + 1);
    }
    updateSlider(card);
    syncVideoFromCard(card);
    markDirty();
  }

  function parseFmt(str) {
    const parts = String(str).trim().split(':');
    if (parts.length === 2) return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
    return parseFloat(str) || 0;
  }

  function onStartTimeChange(e) {
    const card = e.target.closest('.card');
    const startRange = card.querySelector('.start-range');
    const stopRange  = card.querySelector('.stop-range');
    let v = parseFmt(e.target.value);
    v = Math.max(0, Math.min(v, parseFloat(stopRange.value) - 1));
    startRange.value = v;
    updateSlider(card);
    syncVideoFromCard(card);
    markDirty();
  }

  function onStopTimeChange(e) {
    const card = e.target.closest('.card');
    const startRange = card.querySelector('.start-range');
    const stopRange  = card.querySelector('.stop-range');
    let v = parseFmt(e.target.value);
    v = Math.min(parseFloat(stopRange.max), Math.max(v, parseFloat(startRange.value) + 1));
    stopRange.value = v;
    updateSlider(card);
    syncVideoFromCard(card);
    markDirty();
  }

  // -----------------------------------------------------------------------
  // Build card DOM
  // -----------------------------------------------------------------------

  function buildCard(v) {
    const li = document.createElement('li');
    li.className = 'card';
    li.dataset.id = v.id;

    const max    = v.length_seconds || v.stop_seconds || 600;
    const startV = v.start_seconds  || 0;
    const stopV  = v.stop_seconds   || max;

    li.innerHTML = `
      <div class="handle" title="drag to reorder">⠿</div>
      <div class="body">
        <div class="meta">
          <span class="title">${escHtml(v.title || v.id)}</span>
          <span class="meta-right">
            <a class="vid-id yt-link text-muted" href="https://www.youtube.com/watch?v=${escHtml(v.id)}" target="_blank" rel="noopener">↗ ${escHtml(v.id)}</a>
            <button class="play-btn" title="jump to this video">▶</button>
          </span>
        </div>
        <div class="slider-wrap">
          <div class="slider-range"></div>
          <input class="start-range" type="range" min="0" max="${max}" step="1" value="${startV}">
          <input class="stop-range"  type="range" min="0" max="${max}" step="1" value="${stopV}">
        </div>
        <div class="times text-dim">
          <span>Start <input class="start-time time-input" type="text"></span>
          <span class="text-faint">${fmt(max)}</span>
          <span>Stop <input class="stop-time time-input" type="text"> <span class="stop-early"></span></span>
        </div>
        <div class="pos-wrap" style="display:none">
          <div class="pos-slider-wrap">
            <div class="pos-fill"></div>
            <input class="pos-range" type="range" min="0" max="${max}" step="1" value="0">
          </div>
          <div class="times text-muted">
            <span>Now Playing</span>
            <span class="pos-display">0:00</span>
          </div>
        </div>
      </div>`;

    li.querySelector('.start-range').addEventListener('input', onStartInput);
    li.querySelector('.stop-range').addEventListener('input', onStopInput);
    li.querySelector('.start-time').addEventListener('change', onStartTimeChange);
    li.querySelector('.stop-time').addEventListener('change', onStopTimeChange);
    li.querySelector('.pos-range').addEventListener('input', onPosInput);
    li.querySelector('.pos-range').addEventListener('change', onPosChange);
    li.querySelector('.play-btn').addEventListener('click', async () => {
      const seconds = parseFloat(li.querySelector('.start-range').value) || 0;
      try {
        const st = await jump(v.id, seconds);
        setActive(st.video_id, st.seconds);
      } catch {}
    });

    // Prevent slider/input interactions from triggering drag
    li.querySelectorAll('input').forEach(input => {
      input.addEventListener('mousedown', e => e.stopPropagation());
    });

    initDrag(li);
    updateSlider(li);
    return li;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // -----------------------------------------------------------------------
  // Sync card → videos array
  // -----------------------------------------------------------------------

  function syncVideoFromCard(card) {
    const id = card.dataset.id;
    const v  = videos.find(v => v.id === id);
    if (!v) return;
    v.start_seconds = parseFloat(card.querySelector('.start-range').value);
    v.stop_seconds  = parseFloat(card.querySelector('.stop-range').value);
  }

  function collectOrder() {
    return [...list.querySelectorAll('.card')].map(card => {
      const id = card.dataset.id;
      return videos.find(v => v.id === id);
    }).filter(Boolean);
  }

  // -----------------------------------------------------------------------
  // Drag & drop reordering
  // -----------------------------------------------------------------------

  let dragSrc = null;

  function initDrag(card) {
    const handle = card.querySelector('.handle');

    handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.addEventListener('dragend', () => {
      card.draggable = false;
      card.classList.remove('dragging', 'drag-over');
      list.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
      dragSrc = null;
    });
    card.addEventListener('dragstart', e => {
      dragSrc = card;
      e.dataTransfer.effectAllowed = 'move';
      card.classList.add('dragging');
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === card) return;
      list.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
      const items = [...list.querySelectorAll('.card')];
      const srcIdx = items.indexOf(dragSrc);
      const dstIdx = items.indexOf(card);
      list.insertBefore(dragSrc, srcIdx < dstIdx ? card.nextSibling : card);
      markDirty();
    });
  }

  // -----------------------------------------------------------------------
  // Render
  // -----------------------------------------------------------------------

  function render(data) {
    videos = data;
    list.innerHTML = '';
    if (!videos.length) {
      list.innerHTML = '<li id="status" class="text-muted">No videos in schedule.</li>';
      return;
    }
    videos.forEach(v => list.appendChild(buildCard(v)));
  }

  // -----------------------------------------------------------------------
  // Init
  // -----------------------------------------------------------------------

  loadSchedule()
    .then(async data => {
      render(data);
      const st = await loadState();
      if (st) setActive(st.video_id, st.seconds);
    })
    .catch(() => { list.innerHTML = '<li id="status" class="text-muted">Failed to load schedule.</li>'; });
</script>
</body>
</html>
