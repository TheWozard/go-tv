<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>go-tv</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player-wrapper { position: fixed; inset: 0; }
    #player-wrapper iframe { width: 100%; height: 100%; border: none; }
    #edit-link {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,.55);
      color: #aaa;
      text-decoration: none;
      font-family: system-ui, sans-serif;
      font-size: .8rem;
      padding: 5px 10px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .2s;
    }
    #edit-link:hover { color: #fff; background: rgba(0,0,0,.8); }
    #edit-link.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="player-wrapper">
    <div id="player"></div>
  </div>
  <a id="edit-link" href="/edit">Edit</a>

  <script>
    /**
     * go-tv client
     *
     * All users share a single global playback state held by the server.
     * On load the client fetches that state, seeks the player to the saved
     * position, and then runs a 1-second tick loop that:
     *   - reports the current position back to the server every 5 seconds
     *     so that new joiners can seek to approximately the right spot, and
     *   - fires advance() when the player reaches the configured stop point.
     *
     * Advancing is coordinated server-side: the first client to POST /api/next
     * wins and moves the global state forward; subsequent calls with the same
     * video ID are silently ignored and the caller receives the already-updated
     * state.
     */

    // YT.Player instance — undefined until onYouTubeIframeAPIReady fires.
    let player;

    // Unmute on the first click anywhere on the page.
    document.addEventListener('click', () => {
      player?.unMute();
    }, { once: true });

    // The video ID currently loaded in the player. Used to detect when
    // applyState() needs to swap to a different video vs. just seek.
    let currentVideoId;

    // The stop point (seconds) for the current video as returned by the server.
    // 0 means no stop is configured and the video plays to its natural end.
    let currentStop = 0;

    // How often the tick loop fires (ms).
    const TICK_MS = 1000;

    // Report position to the server every Nth tick. At TICK_MS=1000 the
    // default of 5 means a progress POST every 5 seconds.
    const PROGRESS_EVERY_N_TICKS = 5;

    // Mutex flag that prevents advance() from being called concurrently.
    // Both the tick loop and onStateChange/onError can trigger it in the same
    // tick; without this flag a video would be skipped twice.
    let advancing = false;

    // -------------------------------------------------------------------------
    // API calls
    // -------------------------------------------------------------------------

    /**
     * Fetches the current global playback state from the server.
     * Returns { video_id, seconds, stop_seconds }.
     */
    async function fetchState() {
      const res = await fetch('/api/state');
      if (!res.ok) throw new Error('failed to fetch state');
      return res.json();
    }

    /**
     * Reports the current playback position to the server so that the stored
     * position stays close to live. Called every 5 seconds while playing.
     * Fire-and-forget — errors are intentionally swallowed by the caller.
     */
    async function postProgress(videoId, seconds) {
      await fetch('/api/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ video_id: videoId, seconds }),
      });
    }

    /**
     * Asks the server to advance past videoId to the next video in the
     * schedule. The server only moves forward if it is still on videoId
     * (first caller wins). Returns the new global state regardless.
     * Throws on a non-OK response.
     */
    async function postNext(videoId) {
      const res = await fetch('/api/next', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ video_id: videoId }),
      });
      if (!res.ok) throw new Error('failed to advance');
      return res.json();
    }

    // -------------------------------------------------------------------------
    // Playback control
    // -------------------------------------------------------------------------

    /**
     * Moves to the next video in the schedule.
     *
     * Guards against concurrent calls with the `advancing` flag — both the
     * tick loop and the player event handlers can trigger this simultaneously.
     * On network failure the player is paused rather than left playing past
     * the stop point; the tick loop will retry once playback resumes.
     */
    async function advance() {
      if (advancing) return;
      advancing = true;
      try {
        const next = await postNext(currentVideoId);
        applyState(next);
      } catch (e) {
        player?.pauseVideo();
      } finally {
        advancing = false;
      }
    }

    /**
     * Applies a state object returned by the server to the player.
     *
     * If the video ID is unchanged, only seeks when the player has drifted
     * more than 5 seconds from the server position — avoids micro-seeks on
     * every progress update while multiple clients are in sync.
     *
     * If the video ID changed, loads the new video and seeks to its start
     * position in a single loadVideoById() call.
     */
    function applyState(state) {
      currentStop = state.stop_seconds;
      if (currentVideoId === state.video_id) {
        if (player && Math.abs(player.getCurrentTime() - state.seconds) > 5) {
          player.seekTo(state.seconds, true);
        }
        return;
      }
      currentVideoId = state.video_id;
      if (player) {
        player.loadVideoById({ videoId: state.video_id, startSeconds: Math.floor(state.seconds) });
      }
    }

    // -------------------------------------------------------------------------
    // Tick loop — runs every second while the player exists
    // -------------------------------------------------------------------------

    let tickCount = 0;
    setInterval(() => {
      // Player not ready yet or not currently playing — nothing to do.
      if (!player || typeof player.getCurrentTime !== 'function') return;
      if (player.getPlayerState() !== YT.PlayerState.PLAYING) return;

      const t = player.getCurrentTime();

      // Report position to the server every 5 ticks (5s) so that new joiners
      // seek to the right spot and the saved state stays current on shutdown.
      if (++tickCount % PROGRESS_EVERY_N_TICKS === 0) {
        postProgress(currentVideoId, t).catch(() => {});
      }

      // Advance to the next video once the player reaches the stop point.
      if (currentStop > 0 && t >= currentStop) advance();
    }, TICK_MS);

    // -------------------------------------------------------------------------
    // YouTube IFrame API bootstrap
    // -------------------------------------------------------------------------

    /**
     * Called by the YouTube IFrame API script once it has finished loading.
     * Fetches server state, then creates the player pointed at the right video
     * and position. Subsequent state changes are handled by applyState().
     */
    // Show the edit link on mouse activity, hide after 3 s of idle.
    // When hidden, a transparent overlay intercepts the next mousemove so we
    // can detect movement inside the fullscreen iframe (which otherwise eats
    // all pointer events). The overlay is removed on first mousemove, so
    // iframe interaction is blocked for at most one frame.
    const editLink = document.getElementById('edit-link');
    let hideTimer;
    let catchOverlay = null;

    function showEdit() {
      if (catchOverlay) { catchOverlay.remove(); catchOverlay = null; }
      editLink.classList.add('visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(hideEdit, 3000);
    }

    function hideEdit() {
      editLink.classList.remove('visible');
      catchOverlay = document.createElement('div');
      catchOverlay.style.cssText = 'position:fixed;inset:0;z-index:9;';
      catchOverlay.addEventListener('mousemove', showEdit, { once: true });
      document.body.appendChild(catchOverlay);
    }

    document.addEventListener('mousemove', showEdit);

    window.onYouTubeIframeAPIReady = async function () {
      let state;
      try {
        state = await fetchState();
      } catch (e) {
        return;
      }

      currentVideoId = state.video_id;
      currentStop = state.stop_seconds;

      player = new YT.Player('player', {
        videoId: state.video_id,
        playerVars: {
          start: Math.floor(state.seconds),
        },
        events: {
          // Natural end of video (or past stop_seconds if end param not set).
          onStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) advance();
          },
          // Skip unplayable videos (removed, embedding disabled, bad ID, etc.).
          onError() {
            advance();
          },
        },
      });
    };
  </script>
  <script src="https://www.youtube.com/iframe_api" async></script>
</body>
</html>
