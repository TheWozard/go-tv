<?xml version="1.0" encoding="UTF-8"?>
<!-- Minimal: just the 7 bars in a clean TV-shaped frame, no distractions -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="tv-screen">
      <rect x="26" y="40" width="148" height="112" rx="18" ry="18"/>
    </clipPath>
  </defs>
  <!-- Dark rounded-square background -->
  <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="#d0eef7"/>
  <!-- Color bars fill the TV shape -->
  <g clip-path="url(#tv-screen)">
    <rect x="26"  y="40" width="21" height="112" fill="#bdbdbd"/>
    <rect x="47"  y="40" width="21" height="112" fill="#bfbf00"/>
    <rect x="68"  y="40" width="22" height="112" fill="#00bfbf"/>
    <rect x="90"  y="40" width="21" height="112" fill="#00bf00"/>
    <rect x="111" y="40" width="21" height="112" fill="#bf00bf"/>
    <rect x="132" y="40" width="22" height="112" fill="#bf0000"/>
    <rect x="154" y="40" width="20" height="112" fill="#0000bf"/>
  </g>
  <!-- TV frame border -->
  <rect x="26" y="40" width="148" height="112" rx="18" ry="18" fill="none" stroke="#1a1a1a" stroke-width="8"/>
  <!-- Stand neck -->
  <rect x="90" y="152" width="20" height="16" rx="3" ry="3" fill="#1a1a1a"/>
  <!-- Stand base -->
  <rect x="60" y="166" width="80" height="12" rx="6" ry="6" fill="#1a1a1a"/>
</svg>
